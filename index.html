<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Clearza – UK Clearance Deals</title>
<meta
  name="description"
  content="Clearza helps users discover UK clearance deals with 30%+ discounts and go directly to retailer websites to complete purchases."
/>

<!-- IMPACT VERIFICATION -->
<meta name="impact-site-verification" value="ab1797ac-c0fd-41fd-be71-7fbb7f221fd1" />

<style>
:root{
  --navy:#071B2B;
  --navy-2: #0B263B;
  --navy-3: #10324A;
  --teal:#1FA2A6;
  --green:#4ADE2B;
  --text:rgba(255,255,255,0.94);
  --text-dim:rgba(255,255,255,0.6);
}

body{
  margin:0;
  font-family:system-ui, -apple-system, sans-serif;
  background:linear-gradient(180deg,var(--navy),var(--navy-2));
  color:var(--text);
  line-height:1.5;
}

a{
  color:inherit;
}

.container{
  max-width:1120px;
  margin:auto;
  padding:0 20px;
}

header{
  position:sticky;
  top:0;
  z-index:20;
  background:rgba(11,38,59,0.94);
  border-bottom:1px solid var(--stroke);
}

.nav{
  min-height:76px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:20px;
}

.logo{
  display:flex;
  align-items:center;
  gap:12px;
  font-size:20px;
  font-weight:800;
  white-space:nowrap;
}

.logo img{
  width:42px;
  height:42px;
  border-radius:10px;
}

nav{
  display:flex;
  flex-wrap:wrap;
  justify-content:flex-end;
  gap:18px;
}

nav a{
  text-decoration:none;
  color:var(--text);
  font-weight:700;
  opacity:0.84;
}

nav a:hover{
  opacity:1;
}

.hero{
  padding:76px 0 52px;
}

.hero-grid{
  display:grid;
  grid-template-columns:1.08fr 0.92fr;
  gap:28px;
  align-items:start;
}

.eyebrow{
  display:inline-block;
  padding:8px 14px;
  border-radius:999px;
  background:rgba(31,162,166,0.14);
  border:1px solid rgba(31,162,166,0.30);
  color:var(--text);
  font-size:13px;
  font-weight:800;
  letter-spacing:0.2px;
}

.hero h1{
  font-size:58px;
  line-height:1.02;
  margin:18px 0 16px;
  letter-spacing:-1.4px;
}

.hero p{
  font-size:20px;
  color:var(--text-dim);
  max-width:720px;
  margin:0;
}

.hero-points{
  margin:22px 0 0;
  padding:0;
  list-style:none;
  display:grid;
  gap:10px;
}

.hero-points li{
  color:var(--text);
  font-weight:700;
}

.hero-actions{
  display:flex;
  flex-wrap:wrap;
  gap:12px;
  margin-top:26px;
}

.btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-height:48px;
  padding:0 18px;
  border-radius:14px;
  text-decoration:none;
  font-weight:800;
  border:1px solid transparent;
  text-align:center;
}

.btn-primary{
  background:var(--teal);
  color:#fff;
}

.btn-secondary{
  background:rgba(255,255,255,0.06);
  border-color:var(--stroke);
  color:var(--text);
}

.hero-side{
  display:grid;
  gap:18px;
}

.hero-panel{
  background:linear-gradient(180deg, rgba(255,255,255,0.07), rgba(255,255,255,0.04));
  border:1px solid var(--stroke);
  border-radius:24px;
  padding:22px;
}

.hero-panel-card{
  background:var(--navy-2);
  border:1px solid var(--stroke);
  border-radius:20px;
  padding:18px;
}

.metric-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin-top:14px;
}

.metric{
  background:rgba(255,255,255,0.04);
  border:1px solid var(--stroke);
  border-radius:16px;
  padding:16px;
}

.metric-kicker{
  color:var(--text-dim);
  font-size:12px;
  font-weight:800;
  text-transform:uppercase;
  letter-spacing:0.6px;
}

.metric strong{
  display:block;
  margin-top:8px;
  font-size:26px;
  line-height:1.1;
}

.metric span:last-child{
  display:block;
  margin-top:4px;
  color:var(--text-dim);
  font-size:14px;
}

.preview-stack{
  display:grid;
  gap:18px;
}

.preview-card{
  background:linear-gradient(180deg, rgba(31,162,166,0.10), rgba(255,255,255,0.04));
  border:1px solid var(--stroke);
  border-radius:24px;
  padding:22px;
}

.preview-card-inner{
  background:var(--navy-2);
  border:1px solid var(--stroke);
  border-radius:20px;
  padding:18px;
}

.preview-top{
  display:flex;
  align-items:flex-start;
  gap:18px;
}

.preview-box{
  width:132px;
  min-width:132px;
  height:132px;
  padding:8px;
  border-radius:18px;
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
}

.preview-box img{
  width:100%;
  height:100%;
  object-fit:contain;
  display:block;
}

.apple-badge{
  width:132px;
  min-width:132px;
  height:132px;
  border-radius:18px;
  background:linear-gradient(180deg, rgba(255,255,255,0.10), rgba(255,255,255,0.04));
  border:1px solid var(--stroke);
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  padding:12px;
  text-align:center;
}

.container{
  padding:40px 20px;
  max-width:900px;
  margin:auto;
}

h1{
  font-size:36px;
  margin-bottom:10px;
}

.screenshots{
  display:grid;
  grid-template-columns:repeat(3, minmax(0,1fr));
  gap:20px;
  margin-top:24px;
}

.screenshot{
  background:var(--card);
  border:1px solid var(--stroke);
  border-radius:22px;
  padding:16px;
}

.screenshot img{
  display:block;
  width:100%;
  border-radius:18px;
  border:1px solid var(--stroke);
  background:var(--navy-2);
}

.screenshot h3{
  margin:14px 0 6px;
  font-size:19px;
}

.screenshot p{
  margin:0;
  color:var(--text-dim);
  font-size:15px;
}

.disclosure{
  background:var(--card-strong);
  border:1px solid var(--stroke);
  border-radius:20px;
  padding:22px;
}

.disclosure p{
  margin:0 0 12px;
  color:var(--text-dim);
  font-size:16px;
}

.disclosure p:last-child{
  margin-bottom:0;
}

.contact-box{
  background:linear-gradient(180deg, rgba(31,162,166,0.10), rgba(255,255,255,0.04));
  border:1px solid var(--stroke);
  border-radius:22px;
  padding:24px;
}

.contact-box p{
  margin:0 0 12px;
  color:var(--text-dim);
  font-size:17px;
}

.contact-line{
  font-size:18px;
  font-weight:800;
}

.contact-line a{
  color:var(--text);
}

.cta{
  text-align:center;
  background:linear-gradient(180deg, rgba(255,255,255,0.06), rgba(31,162,166,0.06));
  border:1px solid var(--stroke);
  border-radius:24px;
  padding:34px 24px;
}

.cta h2{
  margin:0 0 12px;
}

.cta p{
  margin:0 auto;
  color:var(--text-dim);
  max-width:700px;
  font-size:18px;
  color:var(--text-dim);
}

.download-btn{
  display:inline-block;
  margin-top:25px;
  padding:16px 28px;
  background:var(--green);
  color:#000;
  font-weight:700;
  border-radius:12px;
  text-decoration:none;
}

.qr{
  margin-top:30px;
}

.qr img{
  width:220px;
  border-radius:12px;
}

.screenshots{
  margin-top:60px;
}

.screenshots img{
  width:260px;
  margin:10px;
  border-radius:12px;
}
</style>
</head>
