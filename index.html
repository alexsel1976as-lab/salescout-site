<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>SaleScout – UK Clearance Deals</title>
<meta

:root{
  --navy:#071B2B;
  --navy-2:#0B263B;
  --navy-3:#10324A;
  --teal:#1FA2A6;
  --green:#4ADE2B;
  --text:rgba(255,255,255,0.94);
  --text-dim:rgba(255,255,255,0.72);
  --stroke:rgba(255,255,255,0.10);
  --card:rgba(255,255,255,0.05);
  --card-strong:rgba(255,255,255,0.07);
}

*{
  box-sizing:border-box;
}

html{
  scroll-behavior:smooth;
}

body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:var(--navy);
  color:var(--text);
  line-height:1.5;
}

a{
  color:inherit;
}

.container{
  max-width:1120px;
  margin:auto;
  padding:0 20px;
}

header{
  position:sticky;
  top:0;
  z-index:20;
  background:rgba(11,38,59,0.92);
  backdrop-filter:blur(10px);
  border-bottom:1px solid var(--stroke);
}

.nav{
  min-height:76px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:20px;
}

.logo{
  display:flex;
  align-items:center;
  gap:12px;
  font-size:22px;
  font-weight:800;
  white-space:nowrap;
}

.logo img{
  width:42px;
  height:42px;
  border-radius:10px;
}

nav{
  display:flex;
  flex-wrap:wrap;
  justify-content:flex-end;
  gap:18px;
}

nav a{
  text-decoration:none;
  font-weight:700;
  color:var(--text);
  opacity:0.84;
}

nav a:hover{
  opacity:1;
}

.hero{
  padding:72px 0 52px;
}

.hero-grid{
  display:grid;
  grid-template-columns:1.15fr 0.85fr;
  gap:28px;
  align-items:center;
}

.eyebrow{
  display:inline-block;
  padding:8px 14px;
  border-radius:999px;
  background:rgba(31,162,166,0.14);
  border:1px solid rgba(31,162,166,0.30);
  color:var(--text);
  font-size:13px;
  font-weight:800;
  letter-spacing:0.2px;
}

.hero h1{
  font-size:58px;
  line-height:1.02;
  margin:18px 0 16px;
  letter-spacing:-1.4px;
}

.hero p{
  font-size:20px;
  color:var(--text-dim);
  max-width:720px;
  margin:0;
}

.hero-points{
  margin:22px 0 0;
  padding:0;
  list-style:none;
  display:grid;
  gap:10px;
}

.hero-points li{
  color:var(--text);
  font-weight:700;
}

.hero-actions{
  display:flex;
  flex-wrap:wrap;
  gap:12px;
  margin-top:26px;
}

.btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-height:48px;
  padding:0 18px;
  border-radius:14px;
  text-decoration:none;
  font-weight:800;
  border:1px solid transparent;
}

.btn-primary{
  background:var(--teal);
  color:#fff;
}

.btn-secondary{
  background:rgba(255,255,255,0.06);
  border-color:var(--stroke);
  color:var(--text);
}
