<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Clearza – UK Clearance Deals</title>
<meta
  name="description"
  content="Clearza helps users discover UK clearance deals with 30%+ discounts and go directly to retailer websites to complete purchases."
/>

<style>
:root{
  --navy:#071B2B;
  --navy-2:#0B263B;
  --navy-3:#10324A;
  --teal:#1FA2A6;
  --green:#4ADE2B;
  --text:rgba(255,255,255,0.94);
  --text-dim:rgba(255,255,255,0.72);
  --stroke:rgba(255,255,255,0.10);
  --card:rgba(255,255,255,0.05);
  --card-strong:rgba(255,255,255,0.07);
  --anchor-offset:96px;
}

*{box-sizing:border-box;}
html{scroll-behavior:smooth;}

body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:var(--navy);
  color:var(--text);
  line-height:1.5;
}

a{color:inherit;}

.container{
  max-width:1120px;
  margin:auto;
  padding:0 20px;
}

header{
  position:sticky;
  top:0;
  z-index:20;
  background:rgba(11,38,59,0.94);
  border-bottom:1px solid var(--stroke);
}

.nav{
  min-height:76px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:20px;
}

.logo{
  display:flex;
  align-items:center;
  gap:12px;
  font-size:22px;
  font-weight:800;
  white-space:nowrap;
}

.logo img{
  width:42px;
  height:42px;
  border-radius:10px;
}

nav{
  display:flex;
  flex-wrap:wrap;
  justify-content:flex-end;
  gap:18px;
}

nav a{
  text-decoration:none;
  font-weight:700;
  color:var(--text);
  opacity:0.84;
}

nav a:hover{opacity:1;}

.hero{padding:76px 0 52px;}

.hero-grid{
  display:grid;
  grid-template-columns:1.08fr 0.92fr;
  gap:28px;
  align-items:start;
}

.eyebrow{
  display:inline-block;
  padding:8px 14px;
  border-radius:999px;
  background:rgba(31,162,166,0.14);
  border:1px solid rgba(31,162,166,0.30);
  font-size:13px;
  font-weight:800;
}

.hero h1{
  font-size:58px;
  margin:18px 0 16px;
}

.hero p{
  font-size:20px;
  color:var(--text-dim);
}

.hero-actions{
  display:flex;
  gap:12px;
  margin-top:26px;
}

.btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-height:48px;
  padding:0 18px;
  border-radius:14px;
  text-decoration:none;
  font-weight:800;
}

.btn-primary{
  background:var(--teal);
  color:#fff;
}

.preview-box{
  width:132px;
  height:132px;
  background:#fff;
  border-radius:18px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.preview-box img{
  width:100%;
  height:100%;
  object-fit:contain;
}

.download-btn{
  display:inline-block;
  margin-top:16px;
  padding:14px 22px;
  background:var(--green);
  color:#000;
  font-weight:800;
  border-radius:12px;
  text-decoration:none;
}
</style>
</head>

<body>

<header>
  <div class="container nav">
    <div class="logo">
      <img src="assets/images/icon.png" />
      <span>Clearza</span>
    </div>
  </div>
</header>

<section class="hero">
  <div class="container hero-grid">

    <div>
      <span class="eyebrow">UK clearance deals • 30%+ discounts</span>
      <h1>UK clearance deals in one place</h1>
      <p>Find real UK clearance deals instantly</p>
    </div>

    <div>

      <!-- UPDATED QR -->
      <div class="preview-box">
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=https://expo.dev/accounts/aleksandr1976/projects/clearza/builds/e7c75a1e-0f99-49bf-bb56-ad976dc44854" />
      </div>

      <!-- UPDATED DOWNLOAD BUTTON -->
      <a class="download-btn"
         href="https://expo.dev/accounts/aleksandr1976/projects/clearza/builds/e7c75a1e-0f99-49bf-bb56-ad976dc44854"
         target="_blank">
         Download App
      </a>

    </div>

  </div>
</section>

</body>
</html>
